kind = "web"
previewPath = "/"
title = "Aosus Website"
version = "1.0.0"
id = "artifacts/aosus-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25211

[services.development]
run = "pnpm --filter @workspace/aosus-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aosus-website", "run", "build" ]
publicDir = "artifacts/aosus-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25211"
BASE_PATH = "/"
